# tmux-sessions.conf — 项目 + 功能 session + Agent window
#
# session 命名：{project}-{slot}，如 mos-dev, mos-algo
# 每个 session 里每个 agent 一个 window
#
# 格式：
#   [project]   项目名和工作目录
#   [agents]    agent 名: CLI命令 | resume参数模板
#               模板占位符:
#                 {name}  — 自动填充 session 全名 (如 mos-dev)
#                 {slot}  — 自动填充 slot 名 (如 dev)
#                 {id}    — 先查 [ids] 配置，没有则交互输入，留空不带 resume
#   [ids]       slot.agent: session_id （预配置 {id} 类 agent 的 session id）
#   [slots]     功能名: agent1, agent2, ...
#
# 以 # 开头为注释，空行忽略

[project]
name: mos
work_dir: /data/home/geminitwang/code/sop_note

[settings]
init_cmd: source ~/.bashrc

[agents]
# 格式: agent名: 命令 | resume参数模板
# {name} = session全名(mos-dev), {slot} = slot名(dev), {id} = 从[ids]读取或交互输入
# 一行模式:  命令 | --resume={id}        → agent --resume=<id>
# 两步模式:  命令 | > /resume {slot}     → 先启动命令，再在 agent 内发送 /resume dev
cursor:         agent            | --resume={id}
codebuddy:      codebuddy        | --resume={id}
claude:         claude           | > /resume {slot}
claude-internal: claude-internal | --resume {id}

[slots]
# 功能名: 要开的 agent（逗号分隔，每个 agent 一个 window）
dev:   cursor, codebuddy, claude-internal
algo:  cursor, codebuddy, claude-internal
ui:    cursor, codebuddy, claude-internal
utils: codebuddy, claude-internal
# doc:   cursor, codebuddy

[ids]
# 格式: slot.agent名: session_id
# 预配置后启动时自动使用，无需交互输入
dev.cursor:  5f1f522c-eb58-44c5-81e3-de713f181679
algo.cursor: b2fca424-1bf0-4723-943e-fc7684fb172c
ui.cursor:   d14d07a6-4696-40bb-8a6c-3b3001309d50


