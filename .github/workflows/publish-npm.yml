name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.5.32)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install MCP build dependencies
        run: cd mcp && npm install --include=dev && npm run build

      - name: Install app dependencies
        run: cd app && npm install --no-workspaces

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: app/.next/cache
          key: nextjs-npm-${{ hashFiles('app/package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx') }}
          restore-keys: |
            nextjs-npm-${{ hashFiles('app/package-lock.json') }}-
            nextjs-npm-

      - name: Build standalone package
        run: |
          cd app && NODE_OPTIONS="--max-old-space-size=8192" npx next build --webpack
          cd ..
          node scripts/prepare-standalone.mjs

      - name: Clean build artifacts before publish
        run: |
          rm -rf app/node_modules app/.next mcp/node_modules node_modules
          # Remove symlinks inside _standalone/node_modules (cause infinite recursion)
          find _standalone/node_modules -type l -delete 2>/dev/null || true
          echo "=== Verifying _standalone exists ==="
          ls -la _standalone/server.js
          echo "=== Checking tarball size ==="
          npm pack --dry-run --ignore-scripts 2>&1 | tail -5

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure latest tag points to this version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Setting latest dist-tag to ${VERSION}..."
          npm dist-tag add "@geminilight/mindos@${VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
